!
! === pe-dc-2 (PE) ===
! Router ID: 10.0.0.21
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.21/32
!

! ── Physical Interfaces ──
interface eth4
 description p-core-2:core
 ip address 10.1.0.18/30
 ip ospf network point-to-point
 no shutdown
!
interface eth6
 description pe-hub-west-1:core
 ip address 10.1.0.26/30
 ip ospf network point-to-point
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.21
 network 10.1.0.18/30 area 0.0.0.0
 network 10.1.0.26/30 area 0.0.0.0
 redistribute connected
!

! ── MPLS Configuration ──
mpls ldp
 router-id 10.0.0.21
 address-family ipv4
  interface eth4
  interface eth6
 exit-address-family
!
interface eth4
 mpls ip
!
interface eth6
 mpls ip
!

! ── MPLS VPN (PE only) ──
router bgp 65000
 bgp router-id 10.0.0.21
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.2 remote-as 65000
 !
 address-family vpnv4 unicast
  neighbor 10.255.0.1 activate
  neighbor 10.255.0.2 activate
  route-target import 65001:400
  route-target export 65001:400
 exit-address-family
!

! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!