!
! === pe-dc-1 (PE) ===
! Router ID: 10.0.0.20
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.20/32
!

! ── Physical Interfaces ──
interface eth3
 description p-core-1:core
 ip address 10.1.0.10/30
 ip ospf network point-to-point
 no shutdown
!
interface eth5
 description pe-hub-east-1:core
 ip address 10.1.0.22/30
 ip ospf network point-to-point
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.20
 network 10.1.0.10/30 area 0.0.0.0
 network 10.1.0.22/30 area 0.0.0.0
 redistribute connected
!

! ── MPLS Configuration ──
mpls ldp
 router-id 10.0.0.20
 address-family ipv4
  interface eth3
  interface eth5
 exit-address-family
!
interface eth3
 mpls ip
!
interface eth5
 mpls ip
!

! ── MPLS VPN (PE only) ──
router bgp 65000
 bgp router-id 10.0.0.20
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.2 remote-as 65000
 !
 address-family vpnv4 unicast
  neighbor 10.255.0.1 activate
  neighbor 10.255.0.2 activate
  route-target import 65001:300
  route-target export 65001:300
 exit-address-family
!

! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!