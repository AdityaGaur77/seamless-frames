!
! === IPSec Overlay Configuration: pe-hub-east-1 (hub) ===
! Site ID: 1
! Loopback: 10.255.0.10
!

! ── IPSec Crypto Configuration for pe-hub-east-1 ──
!
! Tunnel to branch-1
crypto ikev2 proposal sd-wan-proposal-branch-1
 encryption aes-256-gcm
 integrity sha256
 group 20
!

crypto ikev2 policy sd-wan-policy-branch-1
 proposal sd-wan-proposal-branch-1
 match address local 10.255.0.10
 match address remote 10.255.0.40
 match identity local id hub-east
 match identity remote id branch-1
!

crypto ipsec profile sd-wan-profile-branch-1
 ikev2-profile sd-wan-policy-branch-1
 pfs group 20
 set security-association lifetime seconds 3600
!

! Pre-shared key for branch-1
crypto ikev2 key branch-1-key
 address 10.255.0.40
 pre-shared-key N0c_C0p1l0t_2024!
!

! Tunnel to branch-2
crypto ikev2 proposal sd-wan-proposal-branch-2
 encryption aes-256-gcm
 integrity sha256
 group 20
!

crypto ikev2 policy sd-wan-policy-branch-2
 proposal sd-wan-proposal-branch-2
 match address local 10.255.0.10
 match address remote 10.255.0.41
 match identity local id hub-east
 match identity remote id branch-2
!

crypto ipsec profile sd-wan-profile-branch-2
 ikev2-profile sd-wan-policy-branch-2
 pfs group 20
 set security-association lifetime seconds 3600
!

! Pre-shared key for branch-2
crypto ikev2 key branch-2-key
 address 10.255.0.41
 pre-shared-key N0c_C0p1l0t_2024!
!


! ── IPSec Tunnel Interface: ipsec-tun-branch-1 ──
interface ipsec-tun-branch-1
 description SD-WAN tunnel to branch-1
 ip address 172.16.1.1/30
 tunnel source 10.255.0.10
 tunnel destination 10.255.0.40
 tunnel mode gre ipsec
 tunnel protection ipsec profile sd-wan-profile-branch-1
 ip ospf network point-to-point
 ip ospf cost 10
 keepalive 10 3
 no shutdown
!

! ── IPSec Tunnel Interface: ipsec-tun-branch-2 ──
interface ipsec-tun-branch-2
 description SD-WAN tunnel to branch-2
 ip address 172.16.2.1/30
 tunnel source 10.255.0.10
 tunnel destination 10.255.0.41
 tunnel mode gre ipsec
 tunnel protection ipsec profile sd-wan-profile-branch-2
 ip ospf network point-to-point
 ip ospf cost 10
 keepalive 10 3
 no shutdown
!


! ── Static Routes for IPSec Overlay ──
ip route 10.0.11.0/24 172.16.1.2 ipsec-tun-branch-1
ip route 10.0.12.0/24 172.16.2.2 ipsec-tun-branch-2
!

! ── BGP Overlay Routing for pe-hub-east-1 ──
router bgp 65010
 bgp router-id 10.255.0.10
 neighbor 172.16.1.2 remote-as 65020
 neighbor 172.16.1.2 description branch-1
 neighbor 172.16.1.2 update-source 10.255.0.10
 neighbor 172.16.1.2 fall-over
 neighbor 172.16.1.2 timers 10 30
 neighbor 172.16.2.2 remote-as 65020
 neighbor 172.16.2.2 description branch-2
 neighbor 172.16.2.2 update-source 10.255.0.10
 neighbor 172.16.2.2 fall-over
 neighbor 172.16.2.2 timers 10 30
 !
 address-family ipv4 unicast
  network 10.255.0.10/32
  neighbor 172.16.1.2 activate
  neighbor 172.16.2.2 activate
 exit-address-family
!

! ── QoS Policies for SD-WAN Overlay ──
!
policy-map sd-wan-qos
 class voice
  priority percent 30
  set dscp ef
 class video
  bandwidth percent 25
  set dscp af41
 class mission-critical
  bandwidth percent 20
  set dscp af31
 class scavenger
  bandwidth percent 10
  set dscp cs1
 class class-default
  bandwidth percent 15
  fair-queue
!
interface ipsec-tun-branch-1
 service-policy output sd-wan-qos
!
interface ipsec-tun-branch-2
 service-policy output sd-wan-qos
!

! ── IPSec Monitoring and DPD ──
crypto logging
crypto isakmp keepalive 10 3
!
! ── NAT Traversal (for behind-NAT branches) ──
crypto nat-traversal enable
!