!
! === IPSec Overlay Configuration: pe-hub-west-1 (hub) ===
! Site ID: 2
! Loopback: 10.255.0.11
!

! ── IPSec Crypto Configuration for pe-hub-west-1 ──
!
! Tunnel to branch-3
crypto ikev2 proposal sd-wan-proposal-branch-3
 encryption aes-256-gcm
 integrity sha256
 group 20
!

crypto ikev2 policy sd-wan-policy-branch-3
 proposal sd-wan-proposal-branch-3
 match address local 10.255.0.11
 match address remote 10.255.0.42
 match identity local id hub-west
 match identity remote id branch-3
!

crypto ipsec profile sd-wan-profile-branch-3
 ikev2-profile sd-wan-policy-branch-3
 pfs group 20
 set security-association lifetime seconds 3600
!

! Pre-shared key for branch-3
crypto ikev2 key branch-3-key
 address 10.255.0.42
 pre-shared-key N0c_C0p1l0t_2024!
!

! Tunnel to branch-4
crypto ikev2 proposal sd-wan-proposal-branch-4
 encryption aes-256-gcm
 integrity sha256
 group 20
!

crypto ikev2 policy sd-wan-policy-branch-4
 proposal sd-wan-proposal-branch-4
 match address local 10.255.0.11
 match address remote 10.255.0.43
 match identity local id hub-west
 match identity remote id branch-4
!

crypto ipsec profile sd-wan-profile-branch-4
 ikev2-profile sd-wan-policy-branch-4
 pfs group 20
 set security-association lifetime seconds 3600
!

! Pre-shared key for branch-4
crypto ikev2 key branch-4-key
 address 10.255.0.43
 pre-shared-key N0c_C0p1l0t_2024!
!


! ── IPSec Tunnel Interface: ipsec-tun-branch-3 ──
interface ipsec-tun-branch-3
 description SD-WAN tunnel to branch-3
 ip address 172.16.3.1/30
 tunnel source 10.255.0.11
 tunnel destination 10.255.0.42
 tunnel mode gre ipsec
 tunnel protection ipsec profile sd-wan-profile-branch-3
 ip ospf network point-to-point
 ip ospf cost 10
 keepalive 10 3
 no shutdown
!

! ── IPSec Tunnel Interface: ipsec-tun-branch-4 ──
interface ipsec-tun-branch-4
 description SD-WAN tunnel to branch-4
 ip address 172.16.4.1/30
 tunnel source 10.255.0.11
 tunnel destination 10.255.0.43
 tunnel mode gre ipsec
 tunnel protection ipsec profile sd-wan-profile-branch-4
 ip ospf network point-to-point
 ip ospf cost 10
 keepalive 10 3
 no shutdown
!


! ── Static Routes for IPSec Overlay ──
ip route 10.0.13.0/24 172.16.3.2 ipsec-tun-branch-3
ip route 10.0.14.0/24 172.16.4.2 ipsec-tun-branch-4
!

! ── BGP Overlay Routing for pe-hub-west-1 ──
router bgp 65010
 bgp router-id 10.255.0.11
 neighbor 172.16.3.2 remote-as 65020
 neighbor 172.16.3.2 description branch-3
 neighbor 172.16.3.2 update-source 10.255.0.11
 neighbor 172.16.3.2 fall-over
 neighbor 172.16.3.2 timers 10 30
 neighbor 172.16.4.2 remote-as 65020
 neighbor 172.16.4.2 description branch-4
 neighbor 172.16.4.2 update-source 10.255.0.11
 neighbor 172.16.4.2 fall-over
 neighbor 172.16.4.2 timers 10 30
 !
 address-family ipv4 unicast
  network 10.255.0.11/32
  neighbor 172.16.3.2 activate
  neighbor 172.16.4.2 activate
 exit-address-family
!

! ── QoS Policies for SD-WAN Overlay ──
!
policy-map sd-wan-qos
 class voice
  priority percent 30
  set dscp ef
 class video
  bandwidth percent 25
  set dscp af41
 class mission-critical
  bandwidth percent 20
  set dscp af31
 class scavenger
  bandwidth percent 10
  set dscp cs1
 class class-default
  bandwidth percent 15
  fair-queue
!
interface ipsec-tun-branch-3
 service-policy output sd-wan-qos
!
interface ipsec-tun-branch-4
 service-policy output sd-wan-qos
!

! ── IPSec Monitoring and DPD ──
crypto logging
crypto isakmp keepalive 10 3
!
! ── NAT Traversal (for behind-NAT branches) ──
crypto nat-traversal enable
!