!
! === p-core-2 (P) ===
! Router ID: 10.0.0.2
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.2/32
!

! ── Physical Interfaces ──
interface eth2
 description p-core-1:core
 ip address 10.1.0.2/30
 ip ospf network point-to-point
 no shutdown
!
interface eth4
 description pe-hub-west-1:core
 ip address 10.1.0.13/30
 ip ospf network point-to-point
 no shutdown
!
interface eth6
 description pe-dc-2:core
 ip address 10.1.0.17/30
 ip ospf network point-to-point
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.2
 network 10.1.0.2/30 area 0.0.0.0
 network 10.1.0.13/30 area 0.0.0.0
 network 10.1.0.17/30 area 0.0.0.0
 redistribute connected
!

! ── MPLS Configuration ──
mpls ldp
 router-id 10.0.0.2
 address-family ipv4
  interface eth2
  interface eth4
  interface eth6
 exit-address-family
!
interface eth2
 mpls ip
!
interface eth4
 mpls ip
!
interface eth6
 mpls ip
!

! ── MPLS VPN (PE only) ──


! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!