!
! === p-core-1 (P) ===
! Router ID: 10.0.0.1
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.1/32
!

! ── Physical Interfaces ──
interface eth1
 description p-core-2:core
 ip address 10.1.0.1/30
 ip ospf network point-to-point
 no shutdown
!
interface eth3
 description pe-hub-east-1:core
 ip address 10.1.0.5/30
 ip ospf network point-to-point
 no shutdown
!
interface eth5
 description pe-dc-1:core
 ip address 10.1.0.9/30
 ip ospf network point-to-point
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.1
 network 10.1.0.1/30 area 0.0.0.0
 network 10.1.0.5/30 area 0.0.0.0
 network 10.1.0.9/30 area 0.0.0.0
 redistribute connected
!

! ── MPLS Configuration ──
mpls ldp
 router-id 10.0.0.1
 address-family ipv4
  interface eth1
  interface eth3
  interface eth5
 exit-address-family
!
interface eth1
 mpls ip
!
interface eth3
 mpls ip
!
interface eth5
 mpls ip
!

! ── MPLS VPN (PE only) ──


! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!