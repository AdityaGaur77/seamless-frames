!
! === ce-branch-4 (CE) ===
! Router ID: 10.0.0.43
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.43/32
!

! ── Physical Interfaces ──
interface eth8
 description pe-hub-west-1:wan
 ip address 10.10.4.2/30
 no shutdown
!
interface eth6
 description ce-branch-2:branch
 ip address 192.168.20.2/24
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.43
 redistribute connected
!

! ── MPLS Configuration ──


! ── MPLS VPN (PE only) ──


! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!