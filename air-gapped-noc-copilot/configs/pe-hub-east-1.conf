!
! === pe-hub-east-1 (PE) ===
! Router ID: 10.0.0.10
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.10/32
!

! ── Physical Interfaces ──
interface eth1
 description p-core-1:core
 ip address 10.1.0.6/30
 ip ospf network point-to-point
 no shutdown
!
interface eth3
 description pe-dc-1:core
 ip address 10.1.0.21/30
 ip ospf network point-to-point
 no shutdown
!
interface eth5
 description ce-branch-1:branch
 ip address 10.10.1.1/30
 ip ospf network point-to-point
 no shutdown
!
interface eth6
 description ce-branch-2:branch
 ip address 10.10.2.1/30
 ip ospf network point-to-point
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.10
 network 10.1.0.6/30 area 0.0.0.0
 network 10.1.0.21/30 area 0.0.0.0
 network 10.10.1.1/30 area 0.0.0.1
 network 10.10.2.1/30 area 0.0.0.1
 redistribute connected
!

! ── MPLS Configuration ──
mpls ldp
 router-id 10.0.0.10
 address-family ipv4
  interface eth1
  interface eth3
 exit-address-family
!
interface eth1
 mpls ip
!
interface eth3
 mpls ip
!

! ── MPLS VPN (PE only) ──
router bgp 65000
 bgp router-id 10.0.0.10
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.2 remote-as 65000
 !
 address-family vpnv4 unicast
  neighbor 10.255.0.1 activate
  neighbor 10.255.0.2 activate
  route-target import 65001:100
  route-target export 65001:100
 exit-address-family
!

! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!