!
! === IPSec Overlay Configuration: ce-branch-4 (spoke) ===
! Site ID: 14
! Loopback: 10.255.0.43
!

! ── IPSec Crypto Configuration for ce-branch-4 ──
!
! Tunnel to hub-west
crypto ikev2 proposal sd-wan-proposal-hub-west
 encryption aes-256-gcm
 integrity sha256
 group 20
!

crypto ikev2 policy sd-wan-policy-hub-west
 proposal sd-wan-proposal-hub-west
 match address local 10.255.0.43
 match address remote 10.255.0.11
 match identity local id branch-4
 match identity remote id hub-west
!

crypto ipsec profile sd-wan-profile-hub-west
 ikev2-profile sd-wan-policy-hub-west
 pfs group 20
 set security-association lifetime seconds 3600
!

! Pre-shared key for hub-west
crypto ikev2 key hub-west-key
 address 10.255.0.11
 pre-shared-key N0c_C0p1l0t_2024!
!


! ── IPSec Tunnel Interface: ipsec-tun-hub-west ──
interface ipsec-tun-hub-west
 description SD-WAN tunnel to hub-west
 ip address 172.16.4.2/30
 tunnel source 10.255.0.43
 tunnel destination 10.255.0.11
 tunnel mode gre ipsec
 tunnel protection ipsec profile sd-wan-profile-hub-west
 ip ospf network point-to-point
 ip ospf cost 10
 keepalive 10 3
 no shutdown
!


! ── Static Routes for IPSec Overlay ──
ip route 10.0.2.0/24 172.16.4.1 ipsec-tun-hub-west
!

! ── BGP Overlay Routing for ce-branch-4 ──
router bgp 65020
 bgp router-id 10.255.0.43
 neighbor 172.16.4.1 remote-as 65010
 neighbor 172.16.4.1 description hub-west
 neighbor 172.16.4.1 update-source 10.255.0.43
 neighbor 172.16.4.1 fall-over
 neighbor 172.16.4.1 timers 10 30
 !
 address-family ipv4 unicast
  network 10.255.0.43/32
  neighbor 172.16.4.1 activate
 exit-address-family
!

! ── QoS Policies for SD-WAN Overlay ──
!
policy-map sd-wan-qos
 class voice
  priority percent 30
  set dscp ef
 class video
  bandwidth percent 25
  set dscp af41
 class mission-critical
  bandwidth percent 20
  set dscp af31
 class scavenger
  bandwidth percent 10
  set dscp cs1
 class class-default
  bandwidth percent 15
  fair-queue
!
interface ipsec-tun-hub-west
 service-policy output sd-wan-qos
!

! ── IPSec Monitoring and DPD ──
crypto logging
crypto isakmp keepalive 10 3
!
! ── NAT Traversal (for behind-NAT branches) ──
crypto nat-traversal enable
!