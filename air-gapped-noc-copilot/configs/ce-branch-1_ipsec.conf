!
! === IPSec Overlay Configuration: ce-branch-1 (spoke) ===
! Site ID: 11
! Loopback: 10.255.0.40
!

! ── IPSec Crypto Configuration for ce-branch-1 ──
!
! Tunnel to hub-east
crypto ikev2 proposal sd-wan-proposal-hub-east
 encryption aes-256-gcm
 integrity sha256
 group 20
!

crypto ikev2 policy sd-wan-policy-hub-east
 proposal sd-wan-proposal-hub-east
 match address local 10.255.0.40
 match address remote 10.255.0.10
 match identity local id branch-1
 match identity remote id hub-east
!

crypto ipsec profile sd-wan-profile-hub-east
 ikev2-profile sd-wan-policy-hub-east
 pfs group 20
 set security-association lifetime seconds 3600
!

! Pre-shared key for hub-east
crypto ikev2 key hub-east-key
 address 10.255.0.10
 pre-shared-key N0c_C0p1l0t_2024!
!


! ── IPSec Tunnel Interface: ipsec-tun-hub-east ──
interface ipsec-tun-hub-east
 description SD-WAN tunnel to hub-east
 ip address 172.16.1.2/30
 tunnel source 10.255.0.40
 tunnel destination 10.255.0.10
 tunnel mode gre ipsec
 tunnel protection ipsec profile sd-wan-profile-hub-east
 ip ospf network point-to-point
 ip ospf cost 10
 keepalive 10 3
 no shutdown
!


! ── Static Routes for IPSec Overlay ──
ip route 10.0.1.0/24 172.16.1.1 ipsec-tun-hub-east
!

! ── BGP Overlay Routing for ce-branch-1 ──
router bgp 65020
 bgp router-id 10.255.0.40
 neighbor 172.16.1.1 remote-as 65010
 neighbor 172.16.1.1 description hub-east
 neighbor 172.16.1.1 update-source 10.255.0.40
 neighbor 172.16.1.1 fall-over
 neighbor 172.16.1.1 timers 10 30
 !
 address-family ipv4 unicast
  network 10.255.0.40/32
  neighbor 172.16.1.1 activate
 exit-address-family
!

! ── QoS Policies for SD-WAN Overlay ──
!
policy-map sd-wan-qos
 class voice
  priority percent 30
  set dscp ef
 class video
  bandwidth percent 25
  set dscp af41
 class mission-critical
  bandwidth percent 20
  set dscp af31
 class scavenger
  bandwidth percent 10
  set dscp cs1
 class class-default
  bandwidth percent 15
  fair-queue
!
interface ipsec-tun-hub-east
 service-policy output sd-wan-qos
!

! ── IPSec Monitoring and DPD ──
crypto logging
crypto isakmp keepalive 10 3
!
! ── NAT Traversal (for behind-NAT branches) ──
crypto nat-traversal enable
!