!
! === ce-branch-2 (CE) ===
! Router ID: 10.0.0.41
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.41/32
!

! ── Physical Interfaces ──
interface eth6
 description pe-hub-east-1:wan
 ip address 10.10.2.2/30
 no shutdown
!
interface eth7
 description ce-branch-4:branch
 ip address 192.168.20.1/24
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.41
 redistribute connected
!

! ── MPLS Configuration ──


! ── MPLS VPN (PE only) ──


! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!