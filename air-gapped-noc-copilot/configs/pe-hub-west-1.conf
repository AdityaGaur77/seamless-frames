!
! === pe-hub-west-1 (PE) ===
! Router ID: 10.0.0.11
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.11/32
!

! ── Physical Interfaces ──
interface eth2
 description p-core-2:core
 ip address 10.1.0.14/30
 ip ospf network point-to-point
 no shutdown
!
interface eth4
 description pe-dc-2:core
 ip address 10.1.0.25/30
 ip ospf network point-to-point
 no shutdown
!
interface eth7
 description ce-branch-3:branch
 ip address 10.10.3.1/30
 ip ospf network point-to-point
 no shutdown
!
interface eth8
 description ce-branch-4:branch
 ip address 10.10.4.1/30
 ip ospf network point-to-point
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.11
 network 10.1.0.14/30 area 0.0.0.0
 network 10.1.0.25/30 area 0.0.0.0
 network 10.10.3.1/30 area 0.0.0.1
 network 10.10.4.1/30 area 0.0.0.1
 redistribute connected
!

! ── MPLS Configuration ──
mpls ldp
 router-id 10.0.0.11
 address-family ipv4
  interface eth2
  interface eth4
 exit-address-family
!
interface eth2
 mpls ip
!
interface eth4
 mpls ip
!

! ── MPLS VPN (PE only) ──
router bgp 65000
 bgp router-id 10.0.0.11
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.2 remote-as 65000
 !
 address-family vpnv4 unicast
  neighbor 10.255.0.1 activate
  neighbor 10.255.0.2 activate
  route-target import 65001:200
  route-target export 65001:200
 exit-address-family
!

! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!