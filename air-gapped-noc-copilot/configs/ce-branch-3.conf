!
! === ce-branch-3 (CE) ===
! Router ID: 10.0.0.42
!

! ── Loopback Interface ──
interface lo
 ip address 10.255.0.42/32
!

! ── Physical Interfaces ──
interface eth7
 description pe-hub-west-1:wan
 ip address 10.10.3.2/30
 no shutdown
!
interface eth5
 description ce-branch-1:branch
 ip address 192.168.10.2/24
 no shutdown
!

! ── OSPF Routing ──
router ospf
 ospf router-id 10.0.0.42
 redistribute connected
!

! ── MPLS Configuration ──


! ── MPLS VPN (PE only) ──


! ── Static Routes ──
ip route 172.20.0.0/24 eth10

! ── BFD for fast failure detection ──
bfd
!