[global_tags]
  environment = "air-gapped-lab"
  site = "containerlab-mpls"

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = false
  hostname = "telegraf-collector"

[[outputs.prometheus_client]]
  listen = ":9124"
  path = "/metrics"
  metric_version = 2
  expiration_interval = "120s"

[[inputs.snmp]]
  agents_file = "/etc/telegraf/snmp_targets.yaml"
  version = 2
  community = "noc-ro"
  name = "snmp"
  interval = "10s"
  timeout = "5s"
  retries = 2
  max_repetitions = 25

  [[inputs.snmp.field]]
    name = "hostname"
    oid = ".1.3.6.1.2.1.1.5.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "uptime"
    oid = ".1.3.6.1.2.1.1.3.0"

  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = [ "hostname" ]
    oid = ".1.3.6.1.2.1.2.2"
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid = ".1.3.6.1.2.1.2.2.1.2"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifName"
      oid = ".1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifAlias"
      oid = ".1.3.6.1.2.1.31.1.1.1.18"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifSpeed"
      oid = ".1.3.6.1.2.1.2.2.1.5"

    [[inputs.snmp.table.field]]
      name = "ifInOctets"
      oid = ".1.3.6.1.2.1.2.2.1.10"

    [[inputs.snmp.table.field]]
      name = "ifOutOctets"
      oid = ".1.3.6.1.2.1.2.2.1.16"

    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid = ".1.3.6.1.2.1.2.2.1.14"

    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid = ".1.3.6.1.2.1.2.2.1.20"

    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid = ".1.3.6.1.2.1.2.2.1.13"

    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid = ".1.3.6.1.2.1.2.2.1.19"

    [[inputs.snmp.table.field]]
      name = "ifHighSpeed"
      oid = ".1.3.6.1.2.1.31.1.1.1.15"

    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = ".1.3.6.1.2.1.31.1.1.1.6"

    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = ".1.3.6.1.2.1.31.1.1.1.10"

    [[inputs.snmp.table.field]]
      name = "ifAdminStatus"
      oid = ".1.3.6.1.2.1.2.2.1.7"

    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = ".1.3.6.1.2.1.2.2.1.8"

  [[inputs.snmp.table]]
    name = "bgp_peer"
    inherit_tags = [ "hostname" ]
    oid = ".1.3.6.1.2.1.15.3.1"
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name = "bgpPeerState"
      oid = ".1.3.6.1.2.1.15.3.1.1.2"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "bgpPeerRemoteAddr"
      oid = ".1.3.6.1.2.1.15.3.1.1.7"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "bgpPeerRemoteAs"
      oid = ".1.3.6.1.2.1.15.3.1.1.9"

    [[inputs.snmp.table.field]]
      name = "bgpPeerInUpdates"
      oid = ".1.3.6.1.2.1.15.3.1.1.10"

    [[inputs.snmp.table.field]]
      name = "bgpPeerOutUpdates"
      oid = ".1.3.6.1.2.1.15.3.1.1.11"

    [[inputs.snmp.table.field]]
      name = "bgpPeerInTotalMessages"
      oid = ".1.3.6.1.2.1.15.3.1.1.12"

    [[inputs.snmp.table.field]]
      name = "bgpPeerOutTotalMessages"
      oid = ".1.3.6.1.2.1.15.3.1.1.13"

    [[inputs.snmp.table.field]]
      name = "bgpPeerFsmEstablishedTime"
      oid = ".1.3.6.1.2.1.15.3.1.1.16"

    [[inputs.snmp.table.field]]
      name = "bgpPeerInUpdateElapsedTime"
      oid = ".1.3.6.1.2.1.15.3.1.1.19"

  [[inputs.snmp.table]]
    name = "ldp_session"
    inherit_tags = [ "hostname" ]
    oid = ".1.3.6.1.4.1.9.9.187.1.2.1.1"
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name = "ldpPeerLabelSpaceId"
      oid = ".1.3.6.1.4.1.9.9.187.1.2.1.1.3"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ldpPeerLabelAdvMode"
      oid = ".1.3.6.1.4.1.9.9.187.1.2.1.1.4"

    [[inputs.snmp.table.field]]
      name = "ldpSessionHoldtime"
      oid = ".1.3.6.1.4.1.9.9.187.1.2.2.1.7"

    [[inputs.snmp.table.field]]
      name = "ldpSessionUpTime"
      oid = ".1.3.6.1.4.1.9.9.187.1.2.2.1.9"

[[inputs.netflow]]
  service_address = "udp://:2055"
  protocol = "netflow"
  read_buffer = 1048576

[[inputs.netflow]]
  service_address = "udp://:4739"
  protocol = "ipfix"
  read_buffer = 1048576

[[inputs.internal]]
  collect_memstats = true
  collect_netstats = true
