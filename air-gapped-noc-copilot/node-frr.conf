! ── Default FRR Configuration Template ──
! This file is overwritten by configure_routing.py per-node
!
hostname localhost
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.1/32
!
router ospf
 ospf router-id 10.0.0.1
 redistribute connected
!
mpls ldp
 router-id 10.0.0.1
 address-family ipv4
!
line vty
!
