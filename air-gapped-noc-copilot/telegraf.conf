# ╔═══════════════════════════════════════════════════════════════╗
# ║ Air-Gapped NOC Copilot - Telegraf Configuration             ║
# ║ Telemetry Collection for MPLS/SD-WAN Network                ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Global Configuration ──
[global_tags]
  environment = "air-gapped-lab"
  project = "noc-copilot"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 5000
  metric_buffer_limit = 100000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "2s"
  precision = "0s"
  hostname = "telegraf-collector"
  omit_hostname = false
  debug = false
  logfile = ""

# ════════════════════════════════════════════════════════════════
# SNMP INPUT - Interface Statistics
# ════════════════════════════════════════════════════════════════

[[inputs.snmp]]
  agents = [
    "udp://172.20.0.10:161",
    "udp://172.20.0.11:161",
    "udp://172.20.0.20:161",
    "udp://172.20.0.21:161",
    "udp://172.20.0.30:161",
    "udp://172.20.0.31:161",
    "udp://172.20.0.40:161",
    "udp://172.20.0.41:161",
    "udp://172.20.0.42:161",
    "udp://172.20.0.43:161",
  ]
  version = 2
  community = "noc_copilot"
  timeout = "10s"
  retries = 3
  interval = "30s"

  # ── Interface Table (ifTable - RFC 1213) ──
  [[inputs.snmp.field]]
    name = "ifIndex"
    oid = ".1.3.6.1.2.1.2.2.1.1"
    is_tag = true

  [[inputs.snmp.field]]
    name = "ifDescr"
    oid = ".1.3.6.1.2.1.2.2.1.2"
    is_tag = true

  [[inputs.snmp.field]]
    name = "ifType"
    oid = ".1.3.6.1.2.1.2.2.1.3"

  [[inputs.snmp.field]]
    name = "ifSpeed"
    oid = ".1.3.6.1.2.1.2.2.1.5"

  [[inputs.snmp.field]]
    name = "ifPhysAddress"
    oid = ".1.3.6.1.2.1.2.2.1.6"

  [[inputs.snmp.field]]
    name = "ifAdminStatus"
    oid = ".1.3.6.1.2.1.2.2.1.7"

  [[inputs.snmp.field]]
    name = "ifOperStatus"
    oid = ".1.3.6.1.2.1.2.2.1.8"

  [[inputs.snmp.field]]
    name = "ifHCInOctets"
    oid = ".1.3.6.1.2.1.31.1.1.1.6"

  [[inputs.snmp.field]]
    name = "ifHCOutOctets"
    oid = ".1.3.6.1.2.1.31.1.1.1.10"

  [[inputs.snmp.field]]
    name = "ifHCInUcastPkts"
    oid = ".1.3.6.1.2.1.31.1.1.1.7"

  [[inputs.snmp.field]]
    name = "ifHCOutUcastPkts"
    oid = ".1.3.6.1.2.1.31.1.1.1.11"

  [[inputs.snmp.field]]
    name = "ifHCInMulticastPkts"
    oid = ".1.3.6.1.2.1.31.1.1.1.8"

  [[inputs.snmp.field]]
    name = "ifHCOutMulticastPkts"
    oid = ".1.3.6.1.2.1.31.1.1.1.12"

  [[inputs.snmp.field]]
    name = "ifHCInBroadcastPkts"
    oid = ".1.3.6.1.2.1.31.1.1.1.9"

  [[inputs.snmp.field]]
    name = "ifHCOutBroadcastPkts"
    oid = ".1.3.6.1.2.1.31.1.1.1.13"

  [[inputs.snmp.field]]
    name = "ifInErrors"
    oid = ".1.3.6.1.2.1.2.2.1.14"

  [[inputs.snmp.field]]
    name = "ifOutErrors"
    oid = ".1.3.6.1.2.1.2.2.1.20"

  [[inputs.snmp.field]]
    name = "ifInDiscards"
    oid = ".1.3.6.1.2.1.2.2.1.13"

  [[inputs.snmp.field]]
    name = "ifOutDiscards"
    oid = ".1.3.6.1.2.1.2.2.1.19"

  # ── IP Net-to-Media Table (ARP) ──
  [[inputs.snmp.table]]
    name = "ipNetToMediaTable"
    oid = ".1.3.6.1.2.1.4.22"

