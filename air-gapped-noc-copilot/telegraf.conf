# ════════════════════════════════════════════════════════════════
# SNMP INPUT - ICMP Latency Monitoring
# ════════════════════════════════════════════════════════════════

[[inputs.ping]]
  hosts = [
    "172.20.0.10",
    "172.20.0.11",
    "172.20.0.20",
    "172.20.0.21",
    "172.20.0.30",
    "172.20.0.31",
    "172.20.0.40",
    "172.20.0.41",
    "172.20.0.42",
    "172.20.0.43",
  ]
  count = 5
  timeout = 5.0
  interval = "30s"
  interface = "eth0"
  percentage = 95.0

# ════════════════════════════════════════════════════════════════
# NetFlow INPUT
# ════════════════════════════════════════════════════════════════

[[inputs.netflow]]
  service = "9995"
  protocol = "udp"
  decoder = "netflow"

  [inputs.netflow.options]
    active_flow_timeout = 60
    template_cache_ttl = "10m"

# ════════════════════════════════════════════════════════════════
# Syslog INPUT
# ════════════════════════════════════════════════════════════════

[[inputs.syslog]]
  server = "udp"
  address = "0.0.0.0:5140"
  name_override = "syslog"
  timezone = "UTC"

  [inputs.syslog.tags]
    source = "network-devices"

# ════════════════════════════════════════════════════════════════
# StatsD INPUT (for custom telemetry)
# ════════════════════════════════════════════════════════════════

[[inputs.statsd]]
  service_address = "udp://:8125"
  delete_gauges = true
  delete_counters = true
  delete_sets = true
  percentile_limit = 1000
  histogram_boundaries = [0.01, 0.05, 0.1, 0.5, 1, 5, 10, 50, 100]

# ════════════════════════════════════════════════════════════════
# PROCESSORS - Data Enrichment
# ════════════════════════════════════════════════════════════════

[[processors.rename]]
  # Rename SNMP fields to more descriptive names
  [[processors.rename.replace]]
    field = "ifHCInOctets"
    dest = "if_in_octets"
  [[processors.rename.replace]]
    field = "ifHCOutOctets"
    dest = "if_out_octets"
  [[processors.rename.replace]]
    field = "ifHCInUcastPkts"
    dest = "if_in_unicast_packets"
  [[processors.rename.replace]]
    field = "ifHCOutUcastPkts"
    dest = "if_out_unicast_packets"
  [[processors.rename.replace]]
    field = "ifInErrors"
    dest = "if_in_errors"
  [[processors.rename.replace]]
    field = "ifOutErrors"
    dest = "if_out_errors"
  [[processors.rename.replace]]
    field = "ifInDiscards"
    dest = "if_in_discards"
  [[processors.rename.replace]]
    field = "ifOutDiscards"
    dest = "if_out_discards"
  [[processors.rename.replace]]
    field = "ifSpeed"
    dest = "if_speed_bps"
  [[processors.rename.replace]]
    field = "ospfNbrState"
    dest = "ospf_neighbor_state"
  [[processors.rename.replace]]
    field = "ospfNbrDeadTimer"
    dest = "ospf_dead_timer"
  [[processors.rename.replace]]
    field = "ospfNbrRetransmissions"
    dest = "ospf_retransmissions"
  [[processors.rename.replace]]
    field = "bgpPeerState"
    dest = "bgp_peer_state"
  [[processors.rename.replace]]
    field = "bgpPeerFsmEstablishedTransitions"
    dest = "bgp_fsm_transitions"
  [[processors.rename.replace]]
    field = "bgpPeerInUpdates"
    dest = "bgp_in_updates"
  [[processors.rename.replace]]
    field = "bgpPeerOutUpdates"
    dest = "bgp_out_updates"
  [[processors.rename.replace]]
    field = "mplsLdpPeerState"
    dest = "mpls_ldp_state"
  [[processors.rename.replace]]
    field = "mplsLdpPeerStateChanges"
    dest = "mpls_ldp_state_changes"
  [[processors.rename.replace]]
    field = "ipSecTunnelEncryptedPackets"
    dest = "ipsec_encrypted_pkts"
  [[processors.rename.replace]]
    field = "ipSecTunnelDecryptedPackets"
    dest = "ipsec_decrypted_pkts"
  [[processors.rename.replace]]
    field = "ipSecTunnelInErrors"
    dest = "ipsec_in_errors"
  [[processors.rename.replace]]
    field = "ipSecTunnelOutErrors"
    dest = "ipsec_out_errors"

[[processors.converter]]
  # Convert string fields to numeric
  [processors.converter.fields]
    integer = ["ifType", "ifAdminStatus", "ifOperStatus", "ifSpeed"]

[[processors.regex]]
  # Extract interface name from ifDescr
  [[processors.regex.replace]]
    field = "ifDescr"
    pattern = "(.*)"
    replacement = "${1}"
    result = "interface_name"

# ════════════════════════════════════════════════════════════════
# AGGREGATORS - Rate Calculations
# ════════════════════════════════════════════════════════════════

[[aggregators.rate]]
  name = "interface_rates"
  drop_original = false
  period = "30s"

  [aggregators.rate.field_filter]
    include = ["if_in_octets", "if_out_octets", "if_in_unicast_packets", "if_out_unicast_packets"]

[[aggregators.basicstats]]
  name = "interface_stats"
  drop_original = false
  period = "60s"
  stats = ["min", "max", "mean", "stdev"]

# ════════════════════════════════════════════════════════════════
# OUTPUTS - Prometheus Exporter
# ════════════════════════════════════════════════════════════════

[[outputs.prometheus_client]]
  listen = "0.0.0.0:9092"
  path = "/metrics"
  expiration_interval = "0s"
  export_timestamp = true

  string_label_fields = ["ifDescr", "sysName", "sysDescr", "interface_name", "ospfRouterId"]

  [outputs.prometheus_client.label_cache]
    capacity = 100000

# ════════════════════════════════════════════════════════════════
# OUTPUTS - InfluxDB Line Protocol (for TimescaleDB via Telegraf)
# ════════════════════════════════════════════════════════════════

[[outputs.influxdb_v2]]
  urls = ["http://timescaledb:8086"]
  token = "noc_copilot_token"
  organization = "noc_copilot"
  bucket = "telemetry"

  [outputs.influxdb_v2.tag]
    environment = "air-gapped-lab"

# ════════════════════════════════════════════════════════════════
# OUTPUTS - File (for backup and ML training data)
# ════════════════════════════════════════════════════════════════

[[outputs.file]]
  files = ["/var/log/telegraf/metrics_backup_$YEAR-$MONTH-$DAY.log"]
  data_format = "json"
  rotation_interval = "24h"
  rotation_max_size = "500MB"
  rotation_max_archives = 30

# ════════════════════════════════════════════════════════════════
# INTERNAL TELEMETRY
# ════════════════════════════════════════════════════════════════

[[inputs.internal]]
  collect_memstats = true
  collect_goroutines = true
  [inputs.internal.tags]
    collector = "telegraf"
